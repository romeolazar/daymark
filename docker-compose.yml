services:
  app:
    image: romeolazar/daymark:latest
    container_name: daymark
    ports:
      - "1403:1403"
    environment:
      - DATABASE_URL=postgresql://daymark:password@db:5432/daymark
      - JWT_SECRET=super_secret_jwt_key_daymark_2026
      - CRON_TOKEN=token_for_cron_reminder_dispatch
      - NODE_ENV=development
      - PORT=1403
    command: sh -c "npx prisma db push && npm run dev"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
      - uploads_data:/app/public/uploads
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: daymark-db
    environment:
      - POSTGRES_DB=daymark
      - POSTGRES_USER=daymark
      - POSTGRES_PASSWORD=password
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U daymark -d daymark"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
  uploads_data:
